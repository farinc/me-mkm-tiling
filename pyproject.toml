[build-system]
requires = ["maturin>=1.0,<2"]
build-backend = "maturin"

[project]
name = "me-mkm"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "numpy>=2.5.0",
    "scipy>=1.17",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=7.1.0",
    "seaborn>=0.13.2",
]

[tool.maturin]
python-source = "python"
module-name = "me_mkm._me_mkm"
features = ["pyo3/extension-module"]
